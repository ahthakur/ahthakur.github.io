<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Assistant</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .section h2 { font-size: 1rem; margin: 0 0 0.75rem 0; color: var(--accent); }
    input, textarea, button {
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    input, textarea { width: 100%; max-width: 400px; }
    button {
      cursor: pointer;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-weight: 600;
      padding: 0.5rem 1rem;
    }
    button:hover { opacity: 0.9; }
    button.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
    label { min-width: 80px; color: var(--muted); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .score { font-weight: 600; }
    .score.high { color: var(--success); }
    .score.med { color: var(--warning); }
    .copy-btn { font-size: 0.75rem; padding: 0.25rem 0.5rem; }
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--success); color: var(--bg);
      padding: 0.5rem 1rem; border-radius: 6px;
      font-size: 0.85rem; opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Job Application Assistant</h1>
  <p class="subtitle">ToS-compliant job discovery. Find jobs, match by skills, copy profile for fast applications.</p>
  <p id="backendHint" class="subtitle" style="display:none;color:var(--warning);">Run backend: <code>cd job-app-assistant && PYTHONPATH=backend ./venv/bin/uvicorn backend.main:app --reload --port 8000</code></p>

  <div class="section">
    <h2>Profile</h2>
    <div class="row">
      <label>Resume</label>
      <input type="file" id="resumeFile" accept=".pdf,.md,.markdown" />
      <button id="parseResume">Parse Resume</button>
    </div>
    <div id="profileStatus" style="margin-top: 0.5rem; color: var(--muted); font-size: 0.85rem;"></div>
    <div id="profileError" style="margin-top: 0.5rem; color: var(--warning); font-size: 0.85rem;"></div>
    <div id="profileData" style="margin-top: 1rem; display: none;">
      <button class="copy-btn secondary" id="copyName">Copy Name</button>
      <button class="copy-btn secondary" id="copyEmail">Copy Email</button>
      <button class="copy-btn secondary" id="copyLinkedIn">Copy LinkedIn</button>
      <button class="copy-btn secondary" id="copySkills">Copy Skills</button>
    </div>
  </div>

  <div class="section">
    <h2>Jobs</h2>
    <div class="row">
      <label>Keywords</label>
      <input type="text" id="keywords" placeholder="cloud security, Kubernetes" />
    </div>
    <div class="row">
      <label>Location</label>
      <input type="text" id="location" placeholder="Austin, Remote" />
    </div>
    <div class="row">
      <button id="fetchJobs">Fetch Jobs</button>
    </div>
    <div id="jobsTable" style="margin-top: 1rem;"></div>
  </div>

  <div id="toast" class="toast">Copied to clipboard</div>

  <script>
    const isBackendOrigin = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const API = isBackendOrigin ? (window.location.origin + '/api') : 'http://localhost:8000/api';
    const h = document.getElementById('backendHint'); if (h && !isBackendOrigin) h.style.display = 'block';
    let profile = null;

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1500);
    }

    async function parseResume() {
      const fileInput = document.getElementById('resumeFile');
      const file = fileInput?.files?.[0];
      const statusEl = document.getElementById('profileStatus');
      const errorEl = document.getElementById('profileError');
      const dataEl = document.getElementById('profileData');

      errorEl.textContent = '';
      if (!file) {
        errorEl.textContent = 'Please select a PDF or Markdown file first.';
        return;
      }

      statusEl.textContent = 'Parsing...';
      dataEl.style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('file', file);

        const r = await fetch(API + '/upload-resume', {
          method: 'POST',
          body: formData
        });

        const data = await r.json().catch(() => ({}));

        if (!r.ok) {
          let msg = 'Upload failed.';
          if (r.status === 404) msg = 'Server not found. Open http://localhost:8000 and ensure the backend is running.';
          else if (data.detail) msg = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
          throw new Error(msg);
        }

        if (!data.profile) throw new Error('Invalid response from server.');

        profile = data.profile;
        statusEl.textContent = 'Loaded: ' + (profile.name || 'Profile') + ' (' + (profile.skills?.length || 0) + ' skills)';
        dataEl.style.display = 'block';
        toast('Resume parsed successfully');
      } catch (e) {
        statusEl.textContent = '';
        errorEl.textContent = 'Error: ' + (e?.message || 'Unknown error');
        toast('Error: ' + (e?.message || 'Unknown error'));
      }
    }

    function copyField(name) {
      if (!profile) return;
      const val = profile[name];
      if (Array.isArray(val)) {
        navigator.clipboard.writeText(val.join(', '));
      } else {
        navigator.clipboard.writeText(val || '');
      }
      toast('Copied to clipboard');
    }

    async function fetchJobs() {
      const kw = document.getElementById('keywords').value.trim();
      const loc = document.getElementById('location').value.trim();
      const params = new URLSearchParams();
      if (kw) params.set('keywords', kw);
      if (loc) params.set('location', loc);
      try {
        const r = await fetch(`${API}/jobs?${params}`);
        if (!r.ok) throw new Error('Failed to fetch');
        const data = await r.json();
        renderJobs(data.jobs);
      } catch (e) {
        document.getElementById('jobsTable').innerHTML = '<p style="color: var(--warning);">Error: ' + e.message + '</p>';
      }
    }

    function renderJobs(jobs) {
      if (!jobs || jobs.length === 0) {
        document.getElementById('jobsTable').innerHTML = '<p style="color: var(--muted);">No jobs found. Add Adzuna API keys for more results.</p>';
        return;
      }
      const rows = jobs.map(j => {
        const scoreClass = j.score >= 60 ? 'high' : j.score >= 30 ? 'med' : '';
        return `<tr>
          <td><a href="${j.url}" target="_blank" rel="noopener">${escapeHtml(j.title)}</a></td>
          <td>${escapeHtml(j.company)}</td>
          <td>${escapeHtml(j.location)}</td>
          <td><span class="score ${scoreClass}">${j.score}</span></td>
          <td>${j.source}</td>
        </tr>`;
      }).join('');
      document.getElementById('jobsTable').innerHTML = `
        <table>
          <thead><tr><th>Title</th><th>Company</th><th>Location</th><th>Match</th><th>Source</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    document.getElementById('parseResume').addEventListener('click', parseResume);
    document.getElementById('fetchJobs').addEventListener('click', fetchJobs);
    document.getElementById('copyName').addEventListener('click', () => copyField('name'));
    document.getElementById('copyEmail').addEventListener('click', () => copyField('email'));
    document.getElementById('copyLinkedIn').addEventListener('click', () => copyField('linkedin'));
    document.getElementById('copySkills').addEventListener('click', () => copyField('skills'));
  </script>
</body>
</html>
